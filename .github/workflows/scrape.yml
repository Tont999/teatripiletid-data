name: Scrape teatripiletid

on:
  schedule:
    # 04:00 UTC = 07:00 EEST (suvi) / 06:00 EET (talv) — käivitub iga päev hommikul
    - cron: "0 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/scrape.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit updated data
        run: |
          set -eu
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(data): scrape $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi

      - name: Upload log as artifact (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-log-${{ github.run_id }}
          path: data/log.txt
          if-no-files-found: ignore
